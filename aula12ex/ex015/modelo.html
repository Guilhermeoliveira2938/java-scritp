<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Verificador de idade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Verificador de idade</h1>
    </header>

    <section>
        <div>
            <p>
                Ano de nascimento:
                <label for="iano"><input type="number" name="ano" id="iano" min="0"></label>
            </p>

            <p>
                Gênero:
                <label for="masculino"><input type="radio" name="sexo" id="masculino">Masculino</label>
                <label for="feminino"><input type="radio" name="sexo" id="feminino">Feminino</label>
            </p>

            <p>
                <input type="button" value="Verificar" onclick="verificar()">
            </p>
        </div>

        <div id="resultado">
        </div>
    </section>

    <footer>Feito por Guilherme Oliveira</footer>

    <script src="script.js"></script>
</body>
</html>
