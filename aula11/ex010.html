<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
    <style>
        body {
            font: normal 25px arial;
            background-color: rgb(197, 197, 197);
            text-align: center;
        }

        h1 {
            width: 90%;
            margin: auto;
            border-radius: 25px;
            font-size: 22px;
            text-align: center;
            background-color: rgb(78, 78, 78);
            color: white;
            
        }

        input[type="number"]{
            height: 44px;
            width: 110px;
            margin-top: 20px;
            font-size: 22px;
            text-align: center;
        }

        input[type="button"] {
            font-size: 22px;
            margin: auto;
            margin-top: 10px;
            text-align: center;
            height: 44px;
            width: 90px;
        }

        input[type="button"]:hover {
            background-color: dimgray;
            color: white;
        }

        div {
            font-size: 26px;
            background-color: black;
            width: 90%;
            border-radius: 20px;
            margin: auto;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Sistema de multas</h1>
    Velocidade do carro : <input type="number" name="velocidade" id="ivelocidade">Km/h
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res"></div>

    <script>
        
        function calcular() {
            var txtvelocidade = document.getElementById('ivelocidade')
            var resultado = document.querySelector('div#res')
            var velocidade = Number(txtvelocidade.value)
            resultado.innerHTML = `<p>Sua velocidade atual é de ${velocidade}KM/h</p>`

            if (velocidade > 50) {
               resultado.innerHTML += `Você ultrapassou o limite de velocidade permitido, você será MULTADO!`
            }
            
        }
    </script>
</body>
</html>
