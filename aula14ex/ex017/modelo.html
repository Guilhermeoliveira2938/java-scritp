<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Tábuada</title>
</head>
<body>
    <header>
        <h1>Tabuada</h1>
    </header>

    <section>
        <div class="input-group">
            <label for="inum">Número</label>
            <input type="number" name="num" id="inum" placeholder="Ex: 7">
            <input type="button" value="Gerar tabuada" onclick="GerarTabuada()">
        </div>

        <div class="input-group">
            <span class="select-label">Resultado</span>
            <select name="tab" id="itab" size="10">
                <option>Digite um número acima</option>
            </select>
        </div>
    </section>

    <footer>Feito por Guilherme Oliveira</footer>

    <script src="script.js"></script>
</body>
</html>
