<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <title>Tábuada</title>
</head>
<body>
    <header>
        <h1>Tabuada</h1>
    </header>

    <section>
        <div class="input-group">
            <label for="inum">Número</label>
            <input type="number" name="num" id="inum" placeholder="Ex: 7">
            <button type="button" onclick="GerarTabuada()">Gerar tabuada</button>
        </div>

        <div class="input-group">
            <span class="select-label">Resultado</span>
            <select name="tab" id="itab" size="10">
                <option>Digite um número acima</option>
            </select>
        </div>
    </section>

    <footer>Feito por Guilherme Oliveira</footer>

    <script>
        function GerarTabuada() {
            let num = document.getElementById('inum')
            let tab = document.getElementById('itab')
            let valor = num.value

            if (!valor || valor.trim() === '') {
                alert('Digite um número para gerar a tabuada!')
            } else {
                let n = parseInt(valor, 10)
                let c = 1
                tab.innerHTML = ""

                while (c <= 10) {
                    let item = document.createElement('option')
                    item.text = `${n} X ${c} = ${n * c}`
                    item.value = `tab${c}`
                    tab.appendChild(item)
                    c++
                }
            }
        }
    </script>
</body>
</html>
