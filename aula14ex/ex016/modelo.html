<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de exercicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Vamos contar</h1>
    </header>

    <section>
        <div id="informacoes">
            <label for="iinicio">Inicio:</label>
            <input type="number" name="inicio" id="iinicio">

            <label for="ifim">Fim:</label>
            <input type="number" name="fim" id="ifim">

            <label for="ipassos">Passos:</label>
            <input type="number" name="passos" id="ipassos">

            <input type="button" value="Contar" onclick="contar()">
        </div>

        <div id="resultado">
            Preparando contagem...
        </div>
    </section>

    <footer>Feito por Guilherme Oliveira</footer>

    <script src="script.js"></script>
</body>
</html>
